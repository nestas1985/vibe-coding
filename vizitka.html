<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Станислав Нещерет — Риелтор</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: rgba(255,255,255,0.06);
      --accent1: #c8a96e;
      --accent2: #e8c98a;
      --accent3: #f5e0b0;
      --text: #e8e0d4;
      --muted: #7a7268;
      --glow: rgba(200,169,110,0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(200,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 70%, rgba(180,130,80,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--accent1);
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(200,169,110,0.08),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(200,169,110,0.04);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent1), transparent);
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      display: inline-flex;
      margin-bottom: 28px;
    }
    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        var(--accent1) 0deg,
        var(--accent2) 90deg,
        var(--accent3) 180deg,
        var(--accent1) 360deg
      );
      animation: spin 6s linear infinite;
      z-index: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner {
      position: relative;
      z-index: 1;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--bg);
    }
    .avatar-inner svg {
      width: 54px;
      height: 54px;
    }

    /* Name */
    .name {
      font-size: clamp(1.65rem, 5vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      background: linear-gradient(135deg, var(--accent3) 0%, var(--accent1) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(200,169,110,0.5));
      animation: glow 3s ease-in-out infinite alternate;
      margin-bottom: 6px;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(200,169,110,0.4)); }
      to   { filter: drop-shadow(0 0 26px rgba(200,169,110,0.75)); }
    }

    /* Specialization badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 5px 14px;
      background: rgba(200,169,110,0.08);
      border: 1px solid rgba(200,169,110,0.2);
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent1);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 28px 0;
    }

    /* Stats row */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 28px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent2);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .social-btn {
      position: relative;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.25s, background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,169,110,0.15), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .social-btn:hover {
      color: var(--accent2);
      border-color: rgba(200,169,110,0.4);
      transform: translateY(-4px) scale(1.08);
      box-shadow: 0 8px 24px rgba(200,169,110,0.2);
    }
    .social-btn:hover::before { opacity: 1; }
    .social-btn svg { position: relative; z-index: 1; width: 22px; height: 22px; }

    /* CTA Button */
    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 24px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-decoration: none;
      color: #0a0a0a;
      background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      box-shadow: 0 4px 20px rgba(200,169,110,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .cta::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,169,110,0.45);
    }
    .cta:hover::after { left: 150%; }
    .cta:active { transform: translateY(0); }
    .cta svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Footer */
    .footer {
      margin-top: 24px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .footer a {
      color: rgba(200,169,110,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: var(--accent1); }

    @media (max-width: 420px) {
      .card { padding: 36px 24px 32px; }
      .stats { gap: 20px; }
    }
  </style>
</head>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  const count = 18;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 2 + 1}px;
      height: ${Math.random() * 2 + 1}px;
      animation-duration: ${Math.random() * 12 + 10}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${Math.random() * 0.5};
    `;
    container.appendChild(p);
  }

  // Card tilt effect on mouse move (desktop only)
  const card = document.querySelector('.card');
  document.addEventListener('mousemove', (e) => {
    if (window.innerWidth < 600) return;
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (window.innerWidth / 2);
    const dy = (e.clientY - cy) / (window.innerHeight / 2);
    const tiltX = dy * -6;
    const tiltY = dx * 6;
    card.style.transform = `perspective(800px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  });
  document.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
    card.style.transition = 'transform 0.5s ease';
  });
</script>
